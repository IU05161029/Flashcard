  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useRef } from 'https://esm.sh/react@18.2.0';

    import { Folder, FileText, Plus, ChevronRight, ChevronLeft, RotateCcw, Save, Trash2, Check, X, Play, Loader2, Sparkles, Files, BookOpen, Type, Database, Zap, Calendar, User, Lock, Key, LogOut, Copy, Clipboard, Shuffle, AlertTriangle, Filter, FolderInput, MessageCircle, Volume2, Search, Settings } from 'https://esm.sh/lucide-react@0.294.0';

    // 🔑 你的 API 鑰匙
    const apiKey = "AIzaSyATaUP8AcuhjlNyriRgPYrRfCrsaCqqQkU"; 

    // 🔥 你的 Firebase 鑰匙
    const fbCfg = {
      apiKey: "AIzaSyB9R8B_N-Y96vcNtkIdCUsqSK5rcCcMFsQ",
      authDomain: "flash-card-8bf5c.firebaseapp.com",
      projectId: "flash-card-8bf5c",
      storageBucket: "flash-card-8bf5c.firebasestorage.app",
      messagingSenderId: "237699713876",
      appId: "1:237699713876:web:8d8803bc0f564cd3a796c1",
      measurementId: "G-MCYTRQ8ZNM"
    };

    const app = !getApps().length ? initializeApp(fbCfg) : getApp();
    const auth = getAuth(app);
    const db = getFirestore(app);
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

    const getLocalYYYYMMDD = (d = new Date()) => `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;

    const triggerVibration = (type) => {
      if (typeof navigator === 'undefined' || !navigator.vibrate) return;
      try { if (type === 'success') navigator.vibrate([30, 50, 30]); else if (type === 'error') navigator.vibrate([100]); else if (type === 'tap') navigator.vibrate([15]); else if (type === 'heavy') navigator.vibrate([50, 100, 50, 100, 50]); } catch(e) {}
    };

    const compressImage = (dataUrl, maxWidth = 1600) => new Promise(res => {
      const img = new Image(); img.onload = () => {
        const canvas = document.createElement('canvas'); const ctx = canvas.getContext('2d');
        const scale = maxWidth / img.width; canvas.width = scale < 1 ? maxWidth : img.width; canvas.height = scale < 1 ? img.height * scale : img.height;
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height); res(canvas.toDataURL('image/jpeg', 0.85)); 
      }; img.src = dataUrl;
    });

    const callGeminiAPI = async (promptText, images = [], isJson = false) => {
      // 📡 【終極解法】自動降級與切換探測雷達：只要有任何一個模型活著，就自動使用它！
      const modelsToTry = ['gemini-2.5-flash', 'gemini-2.0-flash', 'gemini-2.0-flash-exp', 'gemini-1.5-pro', 'gemini-1.5-flash'];
      const parts = [{ text: promptText }, ...images.map(img => ({ inlineData: { mimeType: img.mimeType, data: img.dataUrl.split(',')[1] } }))];
      let lastError = "";

      for (let i = 0; i < modelsToTry.length; i++) {
        const modelName = modelsToTry[i];
        const url = `https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${apiKey}`;
        
        const payload = { contents: [{ role: "user", parts }], generationConfig: { temperature: 0.0 } };
        if (isJson) { 
          payload.generationConfig = { ...payload.generationConfig, responseMimeType: "application/json", responseSchema: { type: "OBJECT", properties: { keypointCards: { type: "ARRAY", items: { type: "OBJECT", properties: { front: { type: "STRING" }, back: { type: "STRING" } }, required: ["front", "back"] } }, englishCards: { type: "ARRAY", items: { type: "OBJECT", properties: { front: { type: "STRING" }, back: { type: "STRING" } }, required: ["front", "back"] } } }, required: ["keypointCards", "englishCards"] } }; 
        }

        try {
          const res = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
          
          if (!res.ok) {
              const errBody = await res.text();
              lastError = errBody;
              if (res.status === 404) continue; // 如果報 404，代表這扇門沒開，無縫切換去敲下一個門！
              throw new Error(`HTTP ${res.status}: ${errBody}`); 
          }
          
          const result = await res.json(); 
          const text = result.candidates?.[0]?.content?.parts?.[0]?.text;
          if (!text) throw new Error("Invalid API Response");
          
          if (isJson) {
            const marker = String.fromCharCode(96, 96, 96);
            const cleanText = text.replace(new RegExp(marker + '(json)?\n?', 'gi'), '').trim();
            return JSON.parse(cleanText);
          }
          return text; // 成功拿到字卡！馬上停止嘗試並回傳
        } catch (error) { 
          lastError = error.message;
          // 如果是鑰匙錯誤或格式錯誤，代表不是型號問題，直接報錯
          if (error.message.includes("HTTP 400") || error.message.includes("HTTP 403")) {
              throw error; 
          }
        }
      }
      throw new Error("所有 AI 模型探測皆失敗，最後錯誤紀錄：" + lastError);
    };

    const generateAccountId = (u, p) => `acc_${encodeURIComponent(u||'').replace(/[^a-zA-Z0-9]/g, '')}_${Math.abs((p||'').split('').reduce((h,c)=>(h<<5)-h+c.charCodeAt(0),0)).toString(36)}`;

    const formatText = (text) => { 
      if (!text || typeof text !== 'string') return text || ''; 
      const f = text.replace(/\*\*(.*?)\*\*/g, '<strong class="text-indigo-700">$1</strong>').replace(/\[\.\.\.\]/g, '<span class="bg-gray-200 text-transparent rounded px-4 py-0.5 mx-1 border-b-2 border-gray-400 select-none">...</span>'); 
      return <span dangerouslySetInnerHTML={{ __html: f.replace(/\n/g, '<br/>') }} />; 
    };

    const calcNextFSRS = (q, oldInterval = 0, oldDifficulty = 5) => { 
      let diff = oldDifficulty < 3 ? 5 : oldDifficulty; 
      let nextD = Math.max(1, Math.min(10, diff - (q - 3)));

                      {isU && pI?.nextStage && (
                        <div className="mt-4 bg-indigo-50/50 p-3 rounded-xl border border-indigo-100 flex flex-col items-center">
                          <div className="text-[10px] font-bold text-gray-500 mb-2 flex items-center justify-between w-full px-1">
                             <span>目前進度</span><span className="text-indigo-600">{pX} / {pI.nextStage.xp} XP</span>
                          </div>
                          <div className="w-full bg-gray-200 rounded-full h-2 mb-3 overflow-hidden">
                             <div className="bg-indigo-500 h-2 rounded-full transition-all" style={{ width: `${pI.progress}%` }}></div>
                          </div>
                          <button 
                             onClick={() => handleUpgradePet(k, pI.nextStage.xp - pX)} 
                             disabled={(stats.xp || 0) < (pI.nextStage.xp - pX)} 
                             className={`w-full py-2 rounded-xl font-bold text-xs shadow-sm active:scale-95 transition-all ${(stats.xp || 0) >= (pI.nextStage.xp - pX) ? 'bg-gradient-to-r from-blue-500 to-indigo-600 text-white hover:shadow-md' : 'bg-gray-200 text-gray-400 cursor-not-allowed'}`}
                          >
                             {(stats.xp || 0) >= (pI.nextStage.xp - pX) ? `⚡ 消耗 ${pI.nextStage.xp - pX} XP 升級` : '持有 XP 不足'}
                          </button>
                        </div>
                      )}
                      {isU && !pI?.nextStage && <div className="mt-4 text-center text-xs font-bold text-yellow-600 bg-yellow-50 py-2 rounded-xl border border-yellow-100">🎉 已達滿級，無法再升級</div>}

                      {isU && (<button onClick={() => togglePetActive(k)} className={`w-full mt-4 py-3 font-bold text-sm rounded-xl active:scale-95 border ${isA ? 'bg-gray-100 text-gray-500 border-gray-200' : 'bg-indigo-50 text-indigo-600 border-indigo-200'}`}>{isA ? '收回精靈球 / 休息' : '召喚伴讀 (最多3隻)'}</button>)}
                    </div>
                  );
                })}
              </div>
            </div>
          );
        }

        if (currentView === 'settings') {
          const MAX_CARDS = 5000; const storagePercent = Math.min(((cards || []).length / MAX_CARDS) * 100, 100).toFixed(1);
          return (
            <div className="p-4 animate-in fade-in slide-in-from-right-4 pb-24">
              <h2 className="text-2xl font-bold mb-6 text-gray-800 flex items-center"><Settings className="w-6 h-6 mr-2 text-indigo-500" /> 系統與設定</h2>
              <div className="bg-white p-5 rounded-2xl shadow-sm border border-gray-200 mb-6">
                <div className="flex items-center justify-between mb-2"><h3 className="font-bold text-gray-800 flex items-center"><span className="mr-2 text-lg">💾</span> 雲端空間狀態</h3><span className="text-xs font-bold text-gray-500">{(cards || []).length} / {MAX_CARDS} 張</span></div>
                <div className="w-full bg-gray-100 rounded-full h-3 mt-3 overflow-hidden border border-gray-200"><div className={`h-3 rounded-full transition-all duration-1000 ${storagePercent > 80 ? 'bg-red-500' : 'bg-blue-500'}`} style={{ width: `${storagePercent}%` }}></div></div>
              </div>
              <div className={`bg-white p-6 rounded-2xl shadow-sm border relative overflow-hidden mb-6 ${customAccount ? 'border-blue-300' : 'border-gray-200'}`}>
                <div className={`absolute top-0 left-0 w-1 h-full ${customAccount ? 'bg-blue-500' : 'bg-gray-400'}`}></div>
                {customAccount ? (
                  <div>
                    <div className="flex justify-between items-center mb-4"><span className="bg-blue-50 text-blue-600 text-xs font-bold px-2 py-1 rounded-full">已綁定本機雲端</span></div>
                    <div className="flex items-center text-gray-800 mb-6">
                      <div className="w-12 h-12 bg-gradient-to-tr from-blue-500 to-indigo-500 rounded-full flex items-center justify-center text-white font-bold text-xl mr-4 shadow-sm">{String(customAccount.username || 'U').charAt(0).toUpperCase()}</div>
                      <div><p className="text-sm text-gray-500">使用者帳號</p><p className="text-xl font-bold">{customAccount.username}</p></div>
                    </div>
                    {customAccount.isAuto && <p className="text-xs text-orange-500 mb-4 font-bold border border-orange-200 bg-orange-50 p-2 rounded">系統為您自動生成的防丟帳號。若要跨裝置請設專屬帳密。</p>}
                    <button onClick={handleLogout} className="w-full flex items-center justify-center p-3 bg-red-50 text-red-600 rounded-xl font-bold hover:bg-red-100 active:scale-95"><LogOut className="w-5 h-5 mr-2" /> {customAccount.isAuto ? '重新設定帳密' : '登出此帳號'}</button>
                  </div>
                ) : (
                  <div>
                    <div className="flex items-center mb-2">🛡️ <h3 className="font-bold text-gray-800 text-lg ml-2">登入或建立帳號</h3></div>
                    <p className="text-xs text-gray-500 mb-5 leading-relaxed">自訂一組帳密，系統會為您建立專屬雲端。<strong>螢幕重整不流失資料！</strong></p>
                    <div className="space-y-4">
                      <div className="flex items-center bg-gray-50 border border-gray-200 rounded-xl p-2 focus-within:ring-2 focus-within:ring-blue-500"><User className="w-5 h-5 text-gray-400 ml-2" /><input type="text" value={usernameInput} onChange={e => setUsernameInput(e.target.value)} placeholder="輸入自訂帳號" className="flex-1 bg-transparent outline-none p-2 text-gray-700 font-medium" /></div>
                      <div className="flex items-center bg-gray-50 border border-gray-200 rounded-xl p-2 focus-within:ring-2 focus-within:ring-blue-500"><Lock className="w-5 h-5 text-gray-400 ml-2" /><input type="password" value={passwordInput} onChange={e => setPasswordInput(e.target.value)} placeholder="輸入密碼" className="flex-1 bg-transparent outline-none p-2 text-gray-700 font-medium" /></div>
                      <button onClick={handleLoginOrRegister} disabled={isAuthLoading} className="w-full flex items-center justify-center p-4 bg-blue-600 text-white rounded-xl font-bold shadow-md hover:bg-blue-700 disabled:opacity-50 active:scale-95">{isAuthLoading ? <Loader2 className="w-5 h-5 animate-spin mr-2" /> : <Key className="w-5 h-5 mr-2" />} 登入 / 註冊</button>
                    </div>
                  </div>
                )}
              </div>
              <div className="bg-white p-5 rounded-2xl shadow-sm border border-gray-200 relative overflow-hidden mb-6">
                <div className="absolute top-0 left-0 w-1 h-full bg-green-500"></div>
                <div className="flex items-center mb-3"><Database className="w-5 h-5 mr-2 text-gray-600" /><h3 className="font-bold text-gray-800 text-base">進階文字備份</h3></div>
                <div className="space-y-3">
                  <button onClick={handleGenerateExportText} className="w-full flex items-center justify-center p-3 bg-gray-100 text-gray-700 rounded-xl font-medium hover:bg-gray-200"><Copy className="w-4 h-4 mr-2" /> 匯出資料 (複製代碼)</button>
                  {showExportArea && (<div className="bg-gray-50 p-3 rounded-xl border border-gray-200 animate-in fade-in"><textarea readOnly value={exportText} className="w-full h-24 p-2 text-[10px] text-gray-400 bg-white border border-gray-200 rounded font-mono outline-none mb-2" /><button onClick={copyToClipboard} className="w-full py-2 bg-blue-500 text-white rounded-lg text-sm font-bold hover:bg-blue-600">點擊複製</button></div>)}
                  <button onClick={() => { setShowImportArea(!showImportArea); setShowExportArea(false); }} className="w-full flex items-center justify-center p-3 bg-white border border-gray-300 text-gray-600 rounded-xl font-medium hover:bg-gray-50"><Clipboard className="w-4 h-4 mr-2" /> 匯入資料 (貼上代碼)</button>
                  {showImportArea && (<div className="bg-gray-50 p-3 rounded-xl border border-gray-200 animate-in fade-in"><textarea value={importText} onChange={e => setImportText(e.target.value)} placeholder="貼上 SYNC_ 開頭的代碼..." className="w-full h-24 p-2 text-xs text-gray-800 bg-white border border-gray-300 rounded font-mono outline-none mb-2 focus:ring-1 focus:ring-blue-500" /><button onClick={handleRestoreFromText} disabled={!importText || isSaving} className="w-full flex items-center justify-center py-2 bg-green-500 text-white rounded-lg text-sm font-bold hover:bg-green-600 disabled:opacity-50">{isSaving ? <Loader2 className="w-4 h-4 animate-spin" /> : '確認還原資料'}</button></div>)}
                </div>
              </div>
            </div>
          );
        }
        
        return null;
      };

      return (
        <div className="min-h-[100dvh] bg-gray-50 font-sans text-gray-900 max-w-md mx-auto relative shadow-2xl overflow-hidden flex flex-col">
          {!['study', 'reviewGen'].includes(currentView) && (
            <header className="bg-white px-5 py-4 shadow-sm z-10 sticky top-0 border-b border-gray-100 flex justify-between items-center">
              <h1 className="text-xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-600 to-indigo-600 flex items-center"><Zap className="w-5 h-5 mr-2 text-blue-500 fill-blue-500" /> AI 字卡</h1>
              <div className={`flex items-center px-3 py-1 rounded-full text-[10px] font-bold shadow-sm cursor-pointer border ${customAccount && !customAccount.isAuto ? 'bg-blue-50 text-blue-600 border-blue-200' : 'bg-gray-100 text-gray-500 border-gray-200'}`} onClick={() => setCurrentView('settings')}>{customAccount && !customAccount.isAuto ? <><User className="w-3 h-3 mr-1" /> {customAccount.username}</> : <><User className="w-3 h-3 mr-1" /> 訪客</>}</div>
            </header>
          )}

          <main className="flex-1 overflow-y-auto relative scrollbar-hide">{renderMainContent()}</main>

          {gachaPhase !== 'idle' && (
            <div className="fixed inset-0 bg-black/80 z-[250] flex items-center justify-center p-4">
               <div className="w-full max-w-sm rounded-3xl p-6 relative flex flex-col items-center justify-center min-h-[300px]">
                  {gachaPhase === 'capsule' && (<div className="animate-gacha-shake cursor-pointer" onClick={handleOpenCapsule}><div className="text-9xl filter drop-shadow-[0_0_15px_rgba(255,255,255,0.8)]">🥚</div><p className="text-white text-center mt-4 font-bold animate-pulse">點擊開啟</p></div>)}
                  {gachaPhase === 'opening' && (<div className="relative flex justify-center items-center"><div className="absolute w-32 h-32 bg-white rounded-full blur-2xl animate-gacha-light"></div><div className="text-9xl animate-spin">✨</div></div>)}
                  {gachaPhase === 'result' && gachaRewardData && (
                     <div className="bg-white p-8 rounded-3xl text-center w-full shadow-2xl animate-in zoom-in-50 duration-500 relative overflow-hidden"><div className="absolute inset-0 bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-yellow-100 to-transparent opacity-50"></div><h3 className="text-2xl font-black text-indigo-900 mb-4 relative z-10">恭喜獲得！</h3><div className="text-6xl mb-4 relative z-10 drop-shadow-md">{gachaRewardData.type === 'xp' ? '🍖' : <img src={PET_FAMILIES[gachaRewardData.value]?.stages[0]?.img} className="w-24 h-24 mx-auto object-contain pixelated" alt="p"/>}</div><p className="text-lg font-bold text-gray-800 relative z-10">{gachaRewardData.type === 'xp' ? `${gachaRewardData.value} XP` : `新夥伴：${PET_FAMILIES[gachaRewardData.value]?.name}`}</p><button onClick={() => setGachaPhase('idle')} className="mt-8 w-full py-3 bg-indigo-600 text-white rounded-xl font-bold active:scale-95 shadow-lg relative z-10">收下獎勵</button></div>
                  )}
               </div>
            </div>
          )}

          {showRouletteModal && (
            <div className="fixed inset-0 bg-black/70 z-[200] flex items-center justify-center p-4 animate-in fade-in">
              <div className={`w-full max-w-sm rounded-3xl p-6 relative shadow-2xl text-center overflow-hidden border-4 ${isSuperRoulette ? 'border-yellow-400 bg-gradient-to-b from-yellow-50 to-yellow-100' : 'border-indigo-100 bg-white'}`}>
                 {!isSpinning && !rouletteResult && <button onClick={() => setShowRouletteModal(false)} className="absolute top-4 right-4 p-2 bg-gray-200 rounded-full z-50"><X className="w-5 h-5" /></button>}
                 <h2 className={`text-2xl font-black mb-1 ${isSuperRoulette ? 'text-yellow-600' : 'text-indigo-900'}`}>{isSuperRoulette ? '🌟 黃金轉盤' : '🎡 幸運轉盤'}</h2>
                 <div className="relative w-64 h-64 mx-auto mb-8 my-4 select-none">
                    <div className="absolute -top-6 left-1/2 transform -translate-x-1/2 z-50 text-5xl drop-shadow-lg pb-2">👇</div>
                    <div className="absolute inset-0 m-auto w-full h-full rounded-full border-8 border-white shadow-inner overflow-hidden" style={{ transform: `rotate(${rotation}deg)`, transition: isSpinning ? 'transform 4.5s cubic-bezier(0.1, 0.7, 0.1, 1)' : 'none', background: `conic-gradient(${activeSlices.map((s, i) => `${s.displayColor} ${i * (360/activeSlices.length)}deg ${(i + 1) * (360/activeSlices.length)}deg`).join(', ')})` }}>
                       {activeSlices.map((sl, i) => (<div key={i} className="absolute w-full h-full pointer-events-none flex flex-col items-center" style={{ transform: `rotate(${(i + 0.5) * (360 / activeSlices.length)}deg)` }}><div className="mt-5 flex flex-col items-center"><span className="text-2xl">{sl.icon}</span><span className="text-[10px] font-black mt-1 bg-white/40 px-1.5 py-0.5 rounded">{sl.label}</span></div></div>))}
                    </div>
                    <div className="absolute inset-0 m-auto w-12 h-12 bg-white rounded-full border-4 border-gray-200 flex items-center justify-center z-10"><div className={`w-5 h-5 rounded-full animate-pulse ${isSuperRoulette ? 'bg-yellow-400' : 'bg-indigo-500'}`}></div></div>
                 </div>
                 <div className="relative z-50">
                   {rouletteResult ? (<div className="animate-in fade-in slide-in-from-bottom-4"><div className="text-4xl mb-2 animate-bounce">{rouletteResult.icon}</div><div className={`text-xl font-black mb-4 ${isSuperRoulette ? 'text-yellow-700' : 'text-indigo-700'}`}>獲得 {rouletteResult.label}！</div><button onClick={claimRouletteReward} className={`w-full py-4 text-white rounded-xl font-black shadow-lg active:scale-95 text-lg ${isSuperRoulette ? 'bg-gradient-to-r from-yellow-500 to-orange-500' : 'bg-gradient-to-r from-blue-500 to-indigo-600'}`}>收下！</button></div>) : (<button onClick={spinRoulette} disabled={isSpinning} className={`w-full py-4 text-white rounded-xl font-black shadow-lg text-xl active:scale-95 ${isSpinning ? 'bg-gray-400' : (isSuperRoulette ? 'bg-gradient-to-r from-yellow-400 to-orange-500' : 'bg-gradient-to-r from-indigo-500 to-purple-600')}`}>{isSpinning ? '轉動中...' : '🎯 抽獎'}</button>)}
                 </div>
              </div>
            </div>
          )}

          {showMixModal && (
             <div className="fixed inset-0 bg-black/60 z-[100] flex items-end sm:items-center justify-center p-4 animate-in fade-in">
               <div className="bg-white w-full max-w-sm rounded-3xl p-6 relative animate-in slide-in-from-bottom-8 max-h-[80vh] flex flex-col">
                 <button onClick={() => setShowMixModal(false)} className="absolute top-4 right-4 p-2 bg-gray-100 rounded-full"><X className="w-5 h-5" /></button>
                 <h2 className="text-xl font-bold mb-4 flex items-center"><Shuffle className="w-5 h-5 mr-2 text-indigo-600"/> 綜合測驗</h2>
                 <div className="bg-indigo-50 p-3 rounded-xl mb-4 border flex justify-center space-x-4"><label className="flex items-center space-x-1 cursor-pointer"><input type="checkbox" checked={filterKeypoint} onChange={e => setFilterKeypoint(e.target.checked)} className="rounded text-indigo-600" /><span className="text-xs font-bold">重點卡</span></label><label className="flex items-center space-x-1 cursor-pointer"><input type="checkbox" checked={filterEnglish} onChange={e => setFilterEnglish(e.target.checked)} className="rounded text-green-600" /><span className="text-xs font-bold">英文卡</span></label></div>
                 <div className="flex-1 overflow-y-auto space-y-4 pr-2 border-t pt-4">
                   {Object.keys((cards || []).reduce((a, c) => { const s=c.subject||'未分'; const ch=c.chapter||'未分'; if(!a[s])a[s]=new Set(); a[s].add(ch); return a; }, {})).map(sub => {
                     const subC = Array.from((cards || []).reduce((a, c) => { const s=c.subject||'未分'; const ch=c.chapter||'未分'; if(!a[s])a[s]=new Set(); a[s].add(ch); return a; }, {})[sub]);
                     return (<div key={sub} className="bg-gray-50 rounded-xl p-3 border"><div className="font-bold text-sm text-indigo-600 mb-2">{sub}</div>{subC.map(ch => { const id = `${sub}::${ch}`; const isC = selectedMixChapters.includes(id); return (<label key={ch} className="flex items-center space-x-3 p-2 hover:bg-gray-100 rounded-lg cursor-pointer"><input type="checkbox" checked={isC} onChange={() => toggleMixChapter(id)} className="w-4 h-4 text-indigo-600 rounded" /><span className="text-sm font-medium">{ch}</span></label>);})}</div>)
                   })}
                 </div>
                 <div className="mt-4 pt-4 border-t space-y-2"><div className="flex space-x-2"><button onClick={() => startMixedReview('srs')} disabled={selectedMixChapters.length===0} className="flex-1 py-3 bg-indigo-600 text-white rounded-xl font-bold disabled:opacity-50 text-xs">排程</button><button onClick={() => startMixedReview('cram')} disabled={selectedMixChapters.length===0} className="flex-1 py-3 bg-yellow-500 text-white rounded-xl font-bold disabled:opacity-50 text-xs">衝刺</button></div><button onClick={() => startMixedReview('list')} disabled={selectedMixChapters.length===0} className="w-full py-3 bg-white text-indigo-600 border rounded-xl font-bold disabled:opacity-50 text-xs">速讀</button></div>
               </div>
             </div>
          )}

          {showChestModal && (
            <div className="fixed inset-0 bg-black/80 z-[250] flex items-center justify-center p-4 animate-in fade-in">
               <div className="bg-white w-full max-w-sm rounded-3xl p-8 relative flex flex-col items-center justify-center shadow-2xl border-4 border-yellow-300">
                  <h3 className="text-2xl font-black text-yellow-600 mb-6 flex items-center"><Sparkles className="w-6 h-6 mr-2"/> 寶箱！</h3>
                  <div className="text-6xl mb-6 animate-bounce">🎁</div><p className="text-lg font-bold text-center">{chestReward}</p>
                  <button onClick={() => { setShowChestModal(false); setChestReward(null); }} className="mt-8 w-full py-4 bg-gradient-to-r from-yellow-500 to-orange-500 text-white rounded-xl font-black active:scale-95 text-lg">太棒了！</button>
               </div>
            </div>
          )}

          {['today', 'folders', 'chapters', 'cardList', 'upload', 'settings', 'pokedex'].includes(currentView) && (
            <nav className="bg-white border-t border-gray-200 fixed bottom-0 w-full max-w-md pb-safe z-40">
              <div className="flex justify-around items-center p-2 relative">
                <button onClick={() => setCurrentView('today')} className={`flex flex-col items-center p-2 w-14 ${['today'].includes(currentView) ? 'text-blue-600' : 'text-gray-400'}`}><div className="relative"><Calendar className={`w-6 h-6 mb-1 ${['today'].includes(currentView) ? 'fill-blue-100' : ''}`} />{dueCards.length > 0 && <span className="absolute -top-1 -right-2 bg-red-500 text-white text-[9px] font-bold px-1.5 py-0.5 rounded-full border-2 border-white shadow-sm">{dueCards.length}</span>}</div><span className="text-[10px] font-bold">首頁</span></button>
                <button onClick={() => setCurrentView('folders')} className={`flex flex-col items-center p-2 w-14 ${['folders', 'chapters', 'cardList'].includes(currentView) ? 'text-blue-600' : 'text-gray-400'}`}><Folder className={`w-6 h-6 mb-1 ${['folders', 'chapters', 'cardList'].includes(currentView) ? 'fill-blue-100' : ''}`} /><span className="text-[10px] font-bold">牌組</span></button>
                <div className="relative -top-5"><button onClick={() => { setUploadSubject(activeSubject||''); setUploadChapter(activeChapter||''); setCurrentView('upload'); }} className="flex items-center justify-center w-14 h-14 bg-gradient-to-tr from-blue-600 to-indigo-500 text-white rounded-full shadow-xl active:scale-95 border-4 border-gray-50"><Plus className="w-7 h-7 stroke-[3]" /></button></div>
                <button onClick={() => setCurrentView('pokedex')} className={`flex flex-col items-center p-2 w-14 ${currentView === 'pokedex' ? 'text-blue-600' : 'text-gray-400'}`}><div className="relative"><span className={`text-xl mb-1 block ${currentView === 'pokedex' ? 'grayscale-0' : 'grayscale opacity-50'}`}>🎟️</span>{(stats.gachaTokens || 0) > 0 && <span className="absolute -top-1 -right-1 bg-pink-500 w-3 h-3 rounded-full border-2 border-white animate-pulse"></span>}</div><span className="text-[10px] font-bold">扭蛋</span></button>
                <button onClick={() => setCurrentView('settings')} className={`flex flex-col items-center p-2 w-14 ${currentView === 'settings' ? 'text-blue-600' : 'text-gray-400'}`}><Settings className={`w-6 h-6 mb-1 ${currentView === 'settings' ? 'fill-blue-100' : ''}`} /><span className="text-[10px] font-bold">設定</span></button>
              </div>
            </nav>
          )}
          {(['study', 'today'].includes(currentView)) && (stats.activePets || []).filter(k => PET_FAMILIES[k]).map((pK, i) => (<DraggablePet key={pK+'-'+i} petKey={pK} petInfo={getPetStatus(pK, (stats.petXp || {})[pK] || 0)} currentView={currentView} initialOffset={i * 110} />))}
          {toast && (<div className="fixed top-20 left-1/2 transform -translate-x-1/2 bg-gray-800 text-white px-6 py-3 rounded-full shadow-xl z-[150] text-sm font-medium animate-in fade-in flex items-center whitespace-nowrap"><Check className="w-4 h-4 mr-2 text-green-400" /> {toast}</div>)}
        </div>
      );
    }
    
    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
