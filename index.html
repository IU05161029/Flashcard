<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI 雙效字卡 | 本機最強版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        .perspective-1000 { perspective: 1000px; }
        .backface-hidden { backface-visibility: hidden; }
        .rotate-y-180 { transform: rotateY(180deg); }
        .transform-style-3d { transform-style: preserve-3d; }
        .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
        
        /* 輕微呼吸動畫 */
        @keyframes breathe {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        .pet-breathe { animation: breathe 3s infinite ease-in-out; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const { 
            Folder, FileText, Plus, ChevronRight, ChevronLeft, 
            Trash2, X, Loader2, Sparkles, Zap, 
            Calendar, Settings, Key, Save, Check,
            Copy, ClipboardCheck, BookOpen, Brain
        } = lucide-react;

        // --- 本機儲存工具 ---
        const Storage = {
            saveCards: (cards) => localStorage.setItem('flashcards_data', JSON.stringify(cards)),
            getCards: () => JSON.parse(localStorage.getItem('flashcards_data') || '[]'),
            saveKey: (key) => localStorage.setItem('gemini_api_key', key),
            getKey: () => localStorage.getItem('gemini_api_key') || '',
            saveStats: (stats) => localStorage.setItem('user_stats', JSON.stringify(stats)),
            getStats: () => JSON.parse(localStorage.getItem('user_stats') || '{"xp":0, "streak":0}')
        };

        // --- Gemini API 調用 ---
        async function generateCardsWithAI(apiKey, subject, chapter, base64Images) {
            const prompt = `你是一位專業的頂大助教。請分析圖片中的教材內容，為科目「${subject}」的「${chapter}」章節製作字卡。
            請輸出 JSON 格式：{"cards": [{"front": "重點題目", "back": "詳細解答"}]}。
            要求：題目要精簡有力，解答要好記且深入。請使用繁體中文。`;

            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`;
            
            const contents = [{
                parts: [
                    { text: prompt },
                    ...base64Images.map(img => ({
                        inlineData: { mimeType: "image/jpeg", data: img.split(',')[1] }
                    }))
                ]
            }];

            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents, generationConfig: { responseMimeType: "application/json" } })
            });

            if (!response.ok) {
                const error = await response.json();
                throw new Error(error.error?.message || "API 連線失敗");
            }

            const result = await response.json();
            const text = result.candidates[0].content.parts[0].text;
            return JSON.parse(text).cards;
        }

        function App() {
            const [view, setView] = useState('home');
            const [cards, setCards] = useState(Storage.getCards());
            const [stats, setStats] = useState(Storage.getStats());
            const [apiKey, setApiKey] = useState(Storage.getKey());
            
            // 生成相關
            const [loading, setLoading] = useState(false);
            const [subject, setSubject] = useState('');
            const [chapter, setChapter] = useState('');
            const [images, setImages] = useState([]);
            const [tempCards, setTempCards] = useState([]);

            // 複習相關
            const [studyList, setStudyList] = useState([]);
            const [studyIndex, setStudyIndex] = useState(0);
            const [isFlipped, setIsFlipped] = useState(false);
            const [activeSubject, setActiveSubject] = useState('');

            // 存檔同步
            useEffect(() => Storage.saveCards(cards), [cards]);
            useEffect(() => Storage.saveStats(stats), [stats]);

            // --- 圖片處理 ---
            const handleImageChange = (e) => {
                const files = Array.from(e.target.files);
                files.forEach(file => {
                    const reader = new FileReader();
                    reader.onload = (ev) => setImages(prev => [...prev, ev.target.result]);
                    reader.readAsDataURL(file);
                });
            };

            // --- 開始生成 ---
            const handleGenerate = async () => {
                if (!apiKey) return alert("請先到設定頁面貼上 API 金鑰！");
                if (!subject || !chapter || images.length === 0) return alert("請填寫科目、章節並上傳圖片！");
                
                setLoading(true);
                try {
                    const aiCards = await generateCardsWithAI(apiKey, subject, chapter, images);
                    setTempCards(aiCards.map(c => ({ ...c, id: Date.now() + Math.random(), subject, chapter, level: 0 })));
                    setView('confirm');
                } catch (err) {
                    alert("生成失敗：" + err.message);
                } finally {
                    setLoading(false);
                }
            };

            // --- 視圖切換 ---
            const renderView = () => {
                switch(view) {
                    case 'home':
                        return (
                            <div className="p-6 space-y-6 animate-in fade-in slide-in-from-bottom-4 duration-500">
                                <div className="bg-gradient-to-br from-indigo-600 to-violet-700 rounded-[2rem] p-8 text-white shadow-2xl relative overflow-hidden">
                                    <div className="relative z-10">
                                        <div className="text-5xl mb-4 pet-breathe inline-block">🐲</div>
                                        <h2 className="text-2xl font-black">讀書守護龍</h2>
                                        <div className="mt-4 flex items-center gap-2">
                                            <div className="px-3 py-1 bg-white/20 rounded-full text-xs font-bold">經驗值: {stats.xp} XP</div>
                                        </div>
                                    </div>
                                    <div className="absolute top-[-20%] right-[-10%] w-48 h-48 bg-white/10 rounded-full blur-3xl"></div>
                                </div>

                                <div className="grid grid-cols-1 gap-4">
                                    <button onClick={() => { setStudyList([...cards].sort(()=>Math.random()-0.5)); setStudyIndex(0); setIsFlipped(false); setView('study'); }} className="bg-white p-8 rounded-[2rem] shadow-sm border border-slate-100 flex flex-col items-center group active:scale-95 transition-all">
                                        <div className="w-16 h-16 bg-indigo-50 rounded-2xl flex items-center justify-center mb-4 group-hover:bg-indigo-100 transition-colors">
                                            <Zap className="text-indigo-600 fill-indigo-600" />
                                        </div>
                                        <span className="text-xl font-black text-slate-800">快速複習</span>
                                        <span className="text-sm text-slate-400 mt-1">目前共有 {cards.length} 張字卡</span>
                                    </button>
                                </div>
                            </div>
                        );

                    case 'folders':
                        const subjects = [...new Set(cards.map(c => c.subject))];
                        return (
                            <div className="p-6 space-y-4">
                                <h2 className="text-2xl font-black text-slate-800">我的書架</h2>
                                <div className="grid grid-cols-2 gap-4">
                                    {subjects.map(s => (
                                        <button key={s} onClick={() => { setActiveSubject(s); setView('subject_detail'); }} className="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm flex flex-col items-center active:scale-95 transition-all">
                                            <Folder className="w-12 h-12 text-blue-500 fill-blue-50 mb-3" />
                                            <span className="font-bold text-slate-700">{s}</span>
                                            <span className="text-[10px] text-slate-400 font-bold mt-1 uppercase">{cards.filter(c => c.subject === s).length} Cards</span>
                                        </button>
                                    ))}
                                    {subjects.length === 0 && <div className="col-span-2 py-20 text-center text-slate-300 font-bold">目前還沒有書，點擊「+」開始讀書</div>}
                                </div>
                            </div>
                        );

                    case 'subject_detail':
                        const chapters = [...new Set(cards.filter(c => c.subject === activeSubject).map(c => c.chapter))];
                        return (
                            <div className="p-6 space-y-4">
                                <button onClick={() => setView('folders')} className="flex items-center text-slate-400 font-bold mb-2"><ChevronLeft className="w-5 h-5" /> 返回書架</button>
                                <h2 className="text-3xl font-black text-slate-800">{activeSubject}</h2>
                                {chapters.map(ch => (
                                    <div key={ch} onClick={() => { setStudyList(cards.filter(c => c.subject === activeSubject && c.chapter === ch)); setStudyIndex(0); setIsFlipped(false); setView('study'); }} className="bg-white p-5 rounded-2xl border border-slate-100 shadow-sm flex justify-between items-center active:bg-indigo-50">
                                        <div className="flex items-center"><BookOpen className="w-5 h-5 text-indigo-500 mr-3" /><span className="font-bold text-slate-700">{ch}</span></div>
                                        <ChevronRight className="w-5 h-5 text-slate-300" />
                                    </div>
                                ))}
                            </div>
                        );

                    case 'upload':
                        return (
                            <div className="p-6 space-y-6">
                                <h2 className="text-2xl font-black text-slate-800">AI 全能建卡</h2>
                                <div className="space-y-4">
                                    <div className="space-y-2">
                                        <label className="text-xs font-black text-slate-400 uppercase ml-1">科目</label>
                                        <input value={subject} onChange={e => setSubject(e.target.value)} placeholder="例如：微積分、解剖學" className="w-full p-4 bg-white border border-slate-200 rounded-2xl font-bold focus:ring-2 focus:ring-indigo-500 outline-none transition-all" />
                                    </div>
                                    <div className="space-y-2">
                                        <label className="text-xs font-black text-slate-400 uppercase ml-1">章節名稱</label>
                                        <input value={chapter} onChange={e => setChapter(e.target.value)} placeholder="例如：第一章、Ch1 概論" className="w-full p-4 bg-white border border-slate-200 rounded-2xl font-bold focus:ring-2 focus:ring-indigo-500 outline-none transition-all" />
                                    </div>
                                    <div className="space-y-2">
                                        <label className="text-xs font-black text-slate-400 uppercase ml-1">上傳圖片 (可多張)</label>
                                        <div className="grid grid-cols-3 gap-2">
                                            {images.map((img, i) => <div key={i} className="aspect-square relative"><img src={img} className="w-full h-full object-cover rounded-xl border border-slate-200" /><button onClick={() => setImages(images.filter((_, idx) => idx !== i))} className="absolute -top-1 -right-1 bg-red-500 text-white rounded-full p-1"><X className="w-3 h-3" /></button></div>)}
                                            <label className="aspect-square bg-slate-100 border-2 border-dashed border-slate-200 rounded-xl flex flex-col items-center justify-center cursor-pointer active:bg-slate-200 transition-colors">
                                                <Plus className="text-slate-400 w-8 h-8" />
                                                <input type="file" multiple accept="image/*" onChange={handleImageChange} className="hidden" />
                                            </label>
                                        </div>
                                    </div>
                                    <button onClick={handleGenerate} disabled={loading} className="w-full py-5 bg-indigo-600 text-white rounded-3xl font-black shadow-xl shadow-indigo-100 flex items-center justify-center gap-2 active:scale-95 transition-all disabled:opacity-50">
                                        {loading ? <Loader2 className="w-6 h-6 animate-spin" /> : <><Sparkles className="w-6 h-6" /> 讓 AI 幫我讀這張圖</>}
                                    </button>
                                </div>
                            </div>
                        );

                    case 'confirm':
                        return (
                            <div className="p-6 space-y-4 pb-32">
                                <h2 className="text-2xl font-black text-slate-800">確認 AI 生成結果</h2>
                                <p className="text-sm text-slate-400 font-bold">共生成了 {tempCards.length} 張字卡</p>
                                {tempCards.map((c, i) => (
                                    <div key={i} className="bg-white p-5 rounded-2xl border border-indigo-100 shadow-sm animate-in fade-in slide-in-from-right-4">
                                        <div className="font-black text-indigo-900 text-lg mb-2">{c.front}</div>
                                        <div className="text-sm text-slate-500 leading-relaxed pt-2 border-t border-slate-50">{c.back}</div>
                                    </div>
                                ))}
                                <div className="fixed bottom-24 left-6 right-6 z-50">
                                    <button onClick={() => { setCards([...cards, ...tempCards]); setTempCards([]); setImages([]); setView('folders'); }} className="w-full py-5 bg-green-500 text-white rounded-[2rem] font-black shadow-2xl flex items-center justify-center gap-2 active:scale-95 transition-all">
                                        <Save className="w-6 h-6" /> 確認存入本機牌組
                                    </button>
                                </div>
                            </div>
                        );

                    case 'study':
                        const card = studyList[studyIndex];
                        if (!card) return setView('home');
                        return (
                            <div className="fixed inset-0 z-[100] bg-slate-900 flex flex-col p-6 animate-in zoom-in-95 duration-300">
                                <div className="flex justify-between items-center text-white mb-10 pt-2">
                                    <span className="px-4 py-1 bg-white/10 rounded-full font-black text-sm">進度 {studyIndex + 1} / {studyList.length}</span>
                                    <button onClick={() => setView('home')} className="p-2 bg-white/10 rounded-full"><X className="w-6 h-6" /></button>
                                </div>
                                <div onClick={() => setIsFlipped(!isFlipped)} className="flex-1 bg-white rounded-[40px] p-8 flex flex-col items-center justify-center text-center shadow-2xl relative transition-all duration-500">
                                    <div className="text-[10px] font-black text-slate-300 uppercase tracking-[0.3em] mb-6">{isFlipped ? 'Answer 解答' : 'Question 題目'}</div>
                                    <div className="text-2xl font-black text-slate-800 leading-relaxed">{isFlipped ? card.back : card.front}</div>
                                    {!isFlipped && <div className="absolute bottom-8 text-indigo-300 text-xs font-bold animate-pulse flex items-center gap-1"><Zap className="w-3 h-3" /> 點擊卡片翻面</div>}
                                </div>
                                <div className="h-28 mt-8 flex gap-4">
                                    {isFlipped ? (
                                        <>
                                            <button onClick={() => { if(studyIndex + 1 >= studyList.length) setView('home'); else { setStudyIndex(studyIndex+1); setIsFlipped(false); } }} className="flex-1 bg-slate-700 text-white rounded-3xl font-black shadow-lg">忘記了</button>
                                            <button onClick={() => { setStats(p => ({...p, xp: p.xp + 10})); if(studyIndex + 1 >= studyList.length) setView('home'); else { setStudyIndex(studyIndex+1); setIsFlipped(false); } }} className="flex-1 bg-indigo-500 text-white rounded-3xl font-black shadow-lg">記住了</button>
                                        </>
                                    ) : <button onClick={() => setIsFlipped(true)} className="w-full border-2 border-white/20 text-white rounded-3xl font-black text-lg">翻看解答</button>}
                                </div>
                            </div>
                        );

                    case 'settings':
                        return (
                            <div className="p-6 space-y-6">
                                <h2 className="text-2xl font-black text-slate-800">系統設定</h2>
                                <div className="bg-white p-6 rounded-[2rem] border border-slate-100 shadow-sm">
                                    <h3 className="font-black text-slate-800 mb-2 flex items-center gap-2"><Key className="w-5 h-5 text-indigo-500" /> AI 大腦鑰匙 (Gemini Key)</h3>
                                    <p className="text-xs text-slate-400 mb-4 font-medium leading-relaxed">請貼上從 Google AI Studio 申請的免費金鑰。此金鑰僅會保存在此 iPad 的本機快取中，不會上傳到任何伺服器。</p>
                                    <input type="password" value={apiKey} onChange={e => { setApiKey(e.target.value); Storage.saveKey(e.target.value); }} placeholder="貼上 AIzaSy... 開頭的金鑰" className="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl font-mono text-sm outline-none focus:ring-2 focus:ring-indigo-500" />
                                    {apiKey && <div className="mt-2 text-[10px] text-green-500 font-bold flex items-center gap-1"><Check className="w-3 h-3" /> 金鑰已就緒</div>}
                                </div>
                                <div className="bg-red-50 p-6 rounded-[2rem] border border-red-100">
                                    <h3 className="font-black text-red-600 mb-1">重置所有資料</h3>
                                    <p className="text-xs text-red-400 mb-4 font-medium">這會永久刪除本機儲存的所有字卡與進度。此動作無法還原。</p>
                                    <button onClick={() => { if(confirm('確定要清空所有本機資料嗎？')) { localStorage.clear(); window.location.reload(); } }} className="w-full py-4 bg-white text-red-600 border border-red-200 rounded-2xl font-black active:bg-red-50 transition-all">立即清除所有本機資料</button>
                                </div>
                            </div>
                        );
                }
            };

            return (
                <div className="max-w-md mx-auto min-h-screen bg-slate-50 relative flex flex-col">
                    {view !== 'study' && (
                        <header className="bg-white/80 backdrop-blur-md p-5 sticky top-0 z-30 border-b border-slate-100 flex justify-between items-center">
                            <h1 className="text-2xl font-black text-indigo-600 flex items-center tracking-tighter"><Zap className="w-6 h-6 mr-1 fill-indigo-600" /> AI 字卡</h1>
                            <div className="bg-green-100 px-3 py-1 rounded-full text-[10px] font-black text-green-600 border border-green-200">本機儲存模式 (極速且免費)</div>
                        </header>
                    )}

                    <main className="flex-1 pb-32">{renderView()}</main>

                    {['home', 'folders', 'upload', 'settings', 'subject_detail', 'confirm'].includes(view) && (
                        <nav className="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white/90 backdrop-blur-lg border-t border-slate-100 p-4 pb-safe flex justify-around items-center z-40">
                            <button onClick={() => setView('home')} className={`p-2 flex flex-col items-center gap-1 ${view==='home'?'text-indigo-600':'text-slate-300'}`}><Calendar className="w-6 h-6" /><span className="text-[10px] font-black">今日</span></button>
                            <button onClick={() => setView('folders')} className={`p-2 flex flex-col items-center gap-1 ${['folders','subject_detail'].includes(view)?'text-indigo-600':'text-slate-300'}`}><Folder className="w-6 h-6" /><span className="text-[10px] font-black">牌組</span></button>
                            <div className="relative -top-6">
                                <button onClick={() => setView('upload')} className="w-16 h-16 bg-gradient-to-tr from-indigo-600 to-indigo-700 rounded-full flex items-center justify-center text-white shadow-xl shadow-indigo-200 border-4 border-white active:scale-90 transition-all">
                                    <Plus className="w-8 h-8 stroke-[3px]" />
                                </button>
                            </div>
                            <button onClick={() => {}} className="p-2 flex flex-col items-center gap-1 text-slate-300 opacity-30"><Brain className="w-6 h-6" /><span className="text-[10px] font-black">統計</span></button>
                            <button onClick={() => setView('settings')} className={`p-2 flex flex-col items-center gap-1 ${view==='settings'?'text-indigo-600':'text-slate-300'}`}><Settings className="w-6 h-6" /><span className="text-[10px] font-black">設定</span></button>
                        </nav>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
